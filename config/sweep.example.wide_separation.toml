# =============================================================================
# Motley Crews — wide-separation variant of config/sweep.example.toml
#
# Each [[variants]] row matches the same label intent as sweep.example.toml, but
# numeric knobs are pushed ~50% further from their baselines:
#   - Global trio (vp_scale, damage_scale, win_bonus): deviation from
#     default_like (10000, 1.0, 10000000) is multiplied by 1.5.
#   - Multipliers defaulting to 1.0 (group_*, w_*): deviation from 1.0 × 1.5.
#   - deploy_forward / deploy_center: deviation from 0.0 × 1.5.
#   - w_class entries: deviation from 1.0 × 1.5 per element.
#
# Use when nearby weights produce identical or ~50% vs-stock outcomes and you
# want stronger contrast. Copy to sweep.toml or pass --config explicitly.
#
#   python -m motley_crews_play.eval_sweep --config config/sweep.example.wide_separation.toml
# =============================================================================

[run]
seed_start = 0
seed_count = 4
max_plies = 5000
calibration_seed_count = 2

[parallel]
workers = 0
game_progress_interval = 50

[output]
csv_path = "config/sweep_out/results_wide.csv"
report_path = "config/sweep_out/report_wide.md"
summary_top_n = 5
time_estimate = true

# Baseline reference (same as default_like in sweep.example.toml)
# vp_scale = 10000.0, damage_scale = 1.0, win_bonus = 10000000.0

# --- Global mix (VP vs damage vs terminal bonus) ---

[[variants]]
label = "default_like"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0

[[variants]]
label = "vp_heavy"
# was 15000 (+5000 vs baseline); +5000 * 1.5
vp_scale = 17500.0
damage_scale = 1.0
win_bonus = 10000000.0

[[variants]]
label = "damage_heavy"
vp_scale = 10000.0
# was 2.0 (+1.0 vs 1.0); +1.0 * 1.5
damage_scale = 2.5
win_bonus = 10000000.0

# --- Groups + deployment geometry ---

[[variants]]
label = "melee_aggressive"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
# was 2.0 (+1.0 from 1.0)
group_melee = 2.5
# was 0.5 from 0
deploy_forward = 0.75

[[variants]]
label = "mage_focus"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
group_mage = 2.5
deploy_center = 0.6

[[variants]]
label = "arb_focus"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
group_arbalist = 2.5

[[variants]]
label = "spell_reach"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
# was [1,1,1.5,1.5,1.5]; bump (x-1)*1.5 for each
w_class = [1.0, 1.0, 1.75, 1.75, 1.75]
deploy_forward = 0.45

# --- Single-class emphasis ---

[[variants]]
label = "knight_emphasis"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
w_knight = 2.5

[[variants]]
label = "barbarian_emphasis"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
w_barbarian = 2.5

[[variants]]
label = "white_mage_emphasis"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
w_white_mage = 2.5

[[variants]]
label = "black_mage_emphasis"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
w_black_mage = 2.5

[[variants]]
label = "arbalist_emphasis"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0
w_arbalist = 2.5
