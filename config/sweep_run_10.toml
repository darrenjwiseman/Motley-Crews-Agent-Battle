# 10 tuned_* weight variants — same max_plies as config/eval.toml (100).
# seed_count is small here so a sweep completes in ~1–3 minutes; for statistical power matching
# eval.toml (200 seeds), set seed_count = 200 (expect long runtime).
# Baseline tuned weights: vp_scale=10000, damage_scale=1, win_bonus=10000000

[run]
seed_start = 0
seed_count = 200
max_plies = 100

[output]
csv_path = "config/sweep_out/run_10_results.csv"
report_path = "config/sweep_out/run_10_report.md"
summary_top_n = 10

[[variants]]
label = "tuned_01_baseline"
vp_scale = 10000.0
damage_scale = 1.0
win_bonus = 10000000.0

